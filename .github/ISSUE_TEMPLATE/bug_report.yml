name: Bug report
description: Report a problem with agent-leash
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill out the details below so we can reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `agent-leash version`
      placeholder: agent-leash 0.1.0 (commit abc1234, built ...)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How were you using it?
      options:
        - "run (supervisor)"
        - "hook (Claude Code or other)"
        - "check"
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact command and (if safe to share) the policy you used.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `agent-leash doctor`
      description: This helps us understand what enforcement is available on your machine.
      render: shell
